<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>AI 图像识别助手</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 70%;
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user {
            background: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .assistant {
            background: #e5e5ea;
            color: #000;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        .input-box {
            display: flex;
            padding: 10px;
            background: #fff;
            border-top: 1px solid #ddd;
        }

        input[type="file"] {
            flex: 1;
        }

        button {
            margin-left: 10px;
            padding: 0 20px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

            button:hover {
                background: #0056b3;
            }
    </style>
</head>
<body>

    <div class="chat-container" id="chat-container">
        <!-- 消息会动态渲染 -->
    </div>

    <!-- 图片上传表单 -->
    <form class="input-box" id="upload-form">
        <input type="file" id="image-input" accept="image/*" required>
        <button type="submit">发送图片</button>
    </form>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const uploadForm = document.getElementById('upload-form');
        const imageInput = document.getElementById('image-input');

        // 渲染消息
        function appendMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', role);
            msgDiv.innerHTML = `<b>${role === 'user' ? '你' : 'AI'}:</b> ${content}`;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 表单提交处理
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!imageInput.files.length) return;

            const file = imageInput.files[0];

            // 显示用户上传消息
            appendMessage('user', `已上传图片: ${file.name}`);

            const formData = new FormData();
            formData.append("image", file);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error("上传失败");

                const data = await response.json();
                // 假设后端返回 { class_name: "类别名称", confidence: 0.92 }
                const aiText = `识别结果: ${data.class_name} (置信度: ${Math.round(data.confidence * 100)}%)`;
                appendMessage('assistant', aiText);

            } catch (err) {
                appendMessage('assistant', `[错误] 无法连接到服务器或上传失败: ${err.message}`);
            }

            // 清空文件选择
            imageInput.value = '';
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>AI 聊天助手</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .message {
      max-width: 70%;
      margin-bottom: 15px;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .user {
      background: #007bff;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 0;
    }

    .assistant {
      background: #e5e5ea;
      color: #000;
      align-self: flex-start;
      border-bottom-left-radius: 0;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: #fff;
      border-top: 1px solid #ddd;
    }

    textarea {
      flex: 1;
      resize: none;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 0 20px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <!-- 多轮对话渲染 -->
    <!-- 后端循环渲染消息列表 -->
    <!-- messages 是一个列表，每条消息包含 role 和 content -->
    % for msg in messages:
      <div class="message {{msg.role}}">
        <b>{{ "你" if msg.role == "user" else "AI" }}:</b> {{ msg.content }}
      </div>
    % endfor
  </div>

  <!-- 输入框 -->
  <form class="input-box" method="POST" action="/chat">
    <textarea name="question" placeholder="请输入你的问题..." required></textarea>
    <button type="submit">发送</button>
  </form>
</body>
</html>

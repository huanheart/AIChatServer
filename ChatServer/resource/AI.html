<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>AI 聊天助手</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .message {
      max-width: 70%;
      margin-bottom: 15px;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .user {
      background: #007bff;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 0;
    }

    .assistant {
      background: #e5e5ea;
      color: #000;
      align-self: flex-start;
      border-bottom-left-radius: 0;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: #fff;
      border-top: 1px solid #ddd;
    }

    textarea {
      flex: 1;
      resize: none;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 0 20px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
    <div class="chat-container" id="chat-container">
        <!-- 初始消息可以由后端渲染 -->
    </div>

    <!-- 输入框 -->
    <form class="input-box" id="chat-form">
        <textarea id="question" placeholder="请输入你的问题..." required></textarea>
        <button type="submit">发送</button>
    </form>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const questionInput = document.getElementById('question');

        // 渲染消息到页面
        function appendMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', role);
            msgDiv.innerHTML = `<b>${role === 'user' ? '你' : 'AI'}:</b> ${content}`;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight; // 自动滚动到底部
        }

        // 表单提交处理
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const question = questionInput.value.trim();
            if (!question) return;

            // 1️⃣ 用户消息先显示在界面
            appendMessage('user', question);
            questionInput.value = '';

            try {
                // 2️⃣ 调用后端接口发送消息
                const response = await fetch('/chat/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })  // 后端期望的字段
                });

                const data = await response.json();

                // 3️⃣ 根据返回数据渲染 AI 消息
                if (data.success) {
                    // 后端返回的 AI 信息在 data.Information
                    appendMessage('assistant', data.Information);
                } else {
                    // 后端返回错误信息
                    appendMessage('assistant', '[错误] ' + (data.message || '未知错误'));
                }
            } catch (err) {
                console.error(err);
                appendMessage('assistant', '[错误] 无法连接到服务器');
            }
        });
    </script>

</body>
</html>
